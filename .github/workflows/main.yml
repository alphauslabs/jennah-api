---
name: main

on: [push, pull_request]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: 'Build all'
      env:
        DEPLOYER_TOKEN: ${{secrets.GH_TOKEN}}
      run: |
        mkdir -p $HOME/.local/bin
        curl -LO https://github.com/bufbuild/buf/releases/download/v1.71.0/buf-Linux-x86_64.tar.gz
        tar xvzf buf-Linux-x86_64.tar.gz
        cp buf/bin/* $HOME/.local/bin/
        export GO111MODULE=on
        export PATH="$PATH:$HOME/.local/bin:$(go env GOPATH)/bin"
        # Start build:
        go install tool && buf dep update && buf generate
        if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
          exit 0
        fi
        # Update jennah-sdk-go:
        WORKSPACE_ROOT=$PWD
        cd /tmp/ && git clone https://$DEPLOYER_TOKEN:@github.com/alphauslabs/jennah-sdk-go && cd jennah-sdk-go/
        cp -rv $WORKSPACE_ROOT/generated/go/* . && git status
        git config user.email "dev@mobingi.com"
        git config user.name "mobingideployer"
        git add . && git commit -am "$GITHUB_REF $GITHUB_SHA" || true
        git remote add origin-tmp https://$DEPLOYER_TOKEN@github.com/alphauslabs/jennah-sdk-go.git > /dev/null 2>&1
        git push --set-upstream origin-tmp
