syntax = "proto3";

package jennahapi.agent.v1;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/alphauslabs/jennah-api/agent";

// MemoryService is the unified memory-data plane for an agent workspace.
service MemoryService {
  // Applies a multi-section memory step in a SINGLE Spanner read-write
  // transaction: an optional execution-log step, an optional set of vector
  // chunks, and an optional set of graph writes. The commit is all-or-nothing —
  // if any section fails (e.g. a vector whose width does not match the
  // database), no section's rows are written. The commit is rejected, writing
  // nothing, if the target workspace does not exist under the caller's tenant.
  // Returns a receipt: the commit timestamp and per-memory-type row counts.
  rpc CommitMemory(CommitMemoryRequest) returns (CommitMemoryResponse) {
    option (google.api.http) = {
      post: "/v1/agents/{agent_instance_id}/memory:commit"
      body: "*"
    };
  }

  // Evaluates a multi-section read against ONE read snapshot so results are
  // internally consistent across memory types: an optional semantic (vector)
  // section, an optional graph (GQL) section, and an optional execution-log
  // section. Returns one result section per requested section, plus a fused
  // result when `link` is set. An optional `as_of` timestamp is applied
  // uniformly to every section so all sections observe the same historical
  // instant. Every section is clamped to the caller's (EnterpriseId,
  // AgentInstanceId) slice.
  rpc QueryMemory(QueryMemoryRequest) returns (QueryMemoryResponse) {
    option (google.api.http) = {
      post: "/v1/agents/{agent_instance_id}/memory:query"
      body: "*"
    };
  }

  // Lists the stored rows of one or more memory sections WITHOUT a query anchor,
  // for debugging and inspection: the vector chunks (content only — embedding
  // vectors are never returned), the graph nodes and edges, and the recent
  // execution-log steps. Unlike QueryMemory it takes no semantic query or graph
  // start pattern; each requested section is simply enumerated within the
  // caller's (EnterpriseId, AgentInstanceId) slice, up to a per-section limit,
  // at ONE read snapshot so every section observes the same instant. This is a
  // read-only diagnostic surface, not a retrieval path.
  rpc InspectMemory(InspectMemoryRequest) returns (InspectMemoryResponse) {
    option (google.api.http) = {
      post: "/v1/agents/{agent_instance_id}/memory:inspect"
      body: "*"
    };
  }

  // Replaces a currently-held graph fact WITHOUT destroying it (add-temporal-
  // graph). In one read-write transaction it closes the prior edge's valid-time
  // window (its invalid_at becomes the new edge's valid_at, its transaction-time
  // start preserved) and inserts the replacement edge in the same
  // (EnterpriseId, AgentInstanceId) slice with a fresh transaction-time start and
  // an open window (unless new_edge.invalid_at is set). The prior edge stays
  // queryable as history via an as_of graph query. Supersession is caller-driven:
  // the platform never infers which facts conflict. new_edge.valid_at (the
  // supersession boundary) is REQUIRED and new_edge.edge_id must differ from
  // prior_edge_id; an unknown prior edge is NotFound and a reused new edge_id is
  // AlreadyExists. This is the graph.supersede surface in the SDK.
  rpc SupersedeEdge(SupersedeEdgeRequest) returns (SupersedeEdgeResponse) {
    option (google.api.http) = {
      post: "/v1/agents/{agent_instance_id}/graph/edges:supersede"
      body: "*"
    };
  }
}

// ---------------------------------------------------------------------------
// Commit
// ---------------------------------------------------------------------------

// Request for MemoryService.CommitMemory.
//
// Any subset of the three section fields may be present; at least one SHOULD
// be. All present sections are written in the same transaction.
message CommitMemoryRequest {
  string agent_instance_id = 1; // route path parameter; never read from the body

  // Execution-log section: a single step the agent recorded. Absent to commit
  // no log step.
  ExecutionLogStep log = 2;

  // Vector section: chunks to upsert (write-or-replace) within the agent slice.
  // Empty to commit no vectors.
  repeated VectorChunk vectors = 3;

  // Graph section: node and/or edge writes. Absent to commit no graph data.
  GraphWrite graph = 4;
}

// A single execution-memory step. On CommitMemory only the payload fields are
// read; `timestamp` is OUTPUT-ONLY (server-assigned) and populated when the
// step is read back via QueryMemory's log section.
message ExecutionLogStep {
  string step_id         = 1; // caller-chosen; unique within the agent slice
  string thought_process = 2;
  string tool_used       = 3;
  string tool_input      = 4;
  string tool_output     = 5;
  google.protobuf.Timestamp timestamp = 6; // output-only; server commit timestamp
}

// A semantic-memory chunk to upsert.
message VectorChunk {
  string chunk_id    = 1; // caller-chosen; unique within the agent slice
  string raw_content = 2;
  // Optional precomputed embedding. When empty, the gateway generates it from
  // raw_content server-side (Vertex AI, task_type RETRIEVAL_DOCUMENT). When
  // supplied, its length MUST equal the data-plane database's configured
  // embedding width or the whole commit is rejected. float (32-bit) matches the
  // store's ARRAY<FLOAT32> vector column.
  repeated float embedding = 3;
}

// Graph-memory writes for one commit. Edges may only connect nodes within the
// same (EnterpriseId, AgentInstanceId) slice. Edges carry an optional bi-temporal
// validity window (see GraphEdge.valid_at/invalid_at); a plain write with neither
// field set records an always-current fact. Replacing a fact while preserving
// history is the caller-driven MemoryService.SupersedeEdge operation, not a plain
// re-write (a re-write of the same edge_id is an idempotent upsert, not a close).
message GraphWrite {
  repeated GraphNode nodes = 1;
  repeated GraphEdge edges = 2;
}

message GraphNode {
  string node_id = 1; // caller-chosen; unique within the agent slice
  string label   = 2;
  google.protobuf.Struct properties = 3; // free-form JSON properties
  // Output-only: the row's last-write commit timestamp, populated when the node
  // is read back via InspectMemory. Nodes are written create-or-replace, so this
  // is the last write, not first creation. Ignored on CommitMemory.
  google.protobuf.Timestamp updated_at = 4;
}

message GraphEdge {
  string edge_id           = 1; // caller-chosen; unique within the agent slice
  string source_node_id    = 2; // must reference a GraphNode in the same slice
  string target_node_id    = 3; // must reference a GraphNode in the same slice
  string relationship_type = 4;
  google.protobuf.Struct properties = 5; // free-form JSON properties
  // Output-only: the row's last-write commit timestamp, populated when the edge
  // is read back via InspectMemory. Edges are written create-or-replace, so this
  // is the last write, not first creation. Ignored on CommitMemory.
  google.protobuf.Timestamp updated_at = 6;

  // Bi-temporal valid-time window (add-temporal-graph), both optional on write.
  // valid_at is when the fact became true in the world; when unset it defaults to
  // the edge's server-assigned creation commit timestamp (so a naive write is an
  // always-current fact). invalid_at is when the fact ceased to be true; unset
  // (absent) means the fact is still held. A caller-supplied valid_at must not be
  // future-dated. Transaction-time (created/expired) is server-assigned and not
  // expressible here. These are write-time inputs; InspectMemory does not populate
  // them on read-back in this change.
  google.protobuf.Timestamp valid_at   = 7;
  google.protobuf.Timestamp invalid_at = 8;
}

// The commit receipt: a commit timestamp plus how many rows were written per
// memory type, so a caller can evidence exactly what the atomic step persisted.
message CommitMemoryResponse {
  google.protobuf.Timestamp commit_timestamp = 1;
  int64 execution_log_rows = 2;
  int64 vector_rows        = 3;
  int64 graph_node_rows    = 4;
  int64 graph_edge_rows    = 5;
}

// ---------------------------------------------------------------------------
// Query
// ---------------------------------------------------------------------------

// Request for MemoryService.QueryMemory.
//
// Any subset of the three section fields may be present. All present sections
// are evaluated at one read timestamp.
message QueryMemoryRequest {
  string agent_instance_id = 1; // route path parameter; never read from the body

  // Semantic (vector/ANN) section. Absent to skip semantic retrieval.
  SemanticQuery semantic = 2;
  // Graph (structured traversal) section. Absent to skip graph retrieval.
  GraphQuery graph = 3;
  // Execution-log recency section. Absent to skip the log.
  LogQuery log = 4;

  // When true, the semantic and graph sections are composed and an additional
  // `fused` result is returned. Requires both of those sections to be present.
  bool link = 5;
  // Fusion direction when `link` is set. Unspecified defaults to VECTOR_FIRST.
  FusionDirection fusion_direction = 6;

  // Optional as-of read timestamp, applied UNIFORMLY to every section so all
  // sections observe the same historical instant. Empty reads the latest data.
  google.protobuf.Timestamp as_of = 7;
}

// Direction of vector+graph fusion when a query links the two sections.
enum FusionDirection {
  FUSION_DIRECTION_UNSPECIFIED = 0; // treated as VECTOR_FIRST
  // ANN vector search produces candidate nodes, then the graph traverses from
  // them. This is the default.
  FUSION_DIRECTION_VECTOR_FIRST = 1;
  // Graph traversal produces a candidate set, then it is ranked by EXACT vector
  // distance (not the ANN index).
  FUSION_DIRECTION_GRAPH_FIRST = 2;
}

// Semantic-section query. Exactly one of `embedding` or `query_text` MUST be
// supplied; when `query_text` is given the gateway embeds it server-side
// (task_type RETRIEVAL_QUERY). Results are ranked by ascending cosine distance
// and clamped to the caller's agent slice (the clamp never silently truncates
// below `limit`).
message SemanticQuery {
  repeated float embedding = 1; // precomputed query embedding; width must match the db
  string         query_text = 2; // embedded server-side when `embedding` is absent
  int32          limit      = 3; // max matches to return
}

// Graph-section query: a STRUCTURED traversal over the agent's
// AgentKnowledgeGraph. The gateway BUILDS the GQL server-side from these typed
// fields, so no caller-authored query text is ever executed: every generated
// pattern element carries the (EnterpriseId, AgentInstanceId) clamp
// unconditionally and the slice cannot be widened. All caller values bind as
// query parameters; the few caller-supplied identifiers (property keys) are
// validated against a strict allowlist. This is the "structural injection, not
// trust" clamp — a free-form GQL string surface was rejected because it would
// require parsing and rewriting untrusted query text.
//
// A query is an anchor node set plus zero or more single-hop traversals. Each
// hop is one `GraphStep`; multi-hop traversal is expressed as successive steps.
message GraphQuery {
  GraphNodeMatch start = 1;      // anchor node set the traversal begins from
  repeated GraphStep steps = 2;  // single-hop traversals; empty returns the anchor set
  int32 limit = 3;               // max rows; <= 0 uses the default, clamped to a server max

  // Bi-temporal time-travel over edge validity (add-temporal-graph). Absent
  // as_of_valid means the default filter: only currently-held edges (invalid_at
  // and expired are both open). A set as_of_valid switches to valid-time interval
  // containment — edges whose valid-time window contains that instant — so the
  // traversal reconstructs the facts believed true at that point in time. A set
  // as_of_tx additionally constrains transaction-time ("as known at as_of_tx"),
  // and is only meaningful together with as_of_valid.
  //
  // These are DELIBERATELY DISTINCT from QueryMemoryRequest.as_of. That field is
  // the physical read snapshot (Spanner ReadTimestamp), bounded by the version-
  // retention window (~1h) and applied to every section's physical read. Graph
  // valid-time must reach arbitrarily far back, so it is evaluated as a bound
  // predicate over the validity columns at the current snapshot — never by moving
  // the physical read timestamp. Both bounds bind as query parameters; the clamp
  // is injected onto every hop exactly like the tenant/agent clamp and cannot be
  // omitted or widened.
  google.protobuf.Timestamp as_of_valid = 4;
  google.protobuf.Timestamp as_of_tx    = 5;
}

// A node-pattern constraint. `label` optionally filters the node's semantic
// `Label` property (e.g. "Person"); `filters` are optional equality predicates.
// The gateway always adds the (EnterpriseId, AgentInstanceId) clamp to the
// generated element — it is NOT expressible here and cannot be overridden.
message GraphNodeMatch {
  string label = 1;                    // optional equality filter on the node's `Label`
  repeated PropertyFilter filters = 2; // optional property equality filters (values bound)
}

// One single-hop traversal to an adjacent node.
message GraphStep {
  string relationship_type = 1;  // optional equality filter on the edge's `RelationshipType`
  GraphDirection direction = 2;  // direction relative to the current node
  GraphNodeMatch node = 3;       // constraints on the node reached by this hop
}

// Traversal direction of a hop relative to the current node.
enum GraphDirection {
  GRAPH_DIRECTION_UNSPECIFIED = 0; // treated as OUTGOING
  GRAPH_DIRECTION_OUTGOING = 1;    // (current)-[edge]->(next)
  GRAPH_DIRECTION_INCOMING = 2;    // (current)<-[edge]-(next)
  GRAPH_DIRECTION_ANY = 3;         // (current)-[edge]-(next), either direction
}

// A single property equality filter. `key` is a property name validated as a
// safe identifier by the gateway (resolved to a first-class column when it is
// one — e.g. `NodeId`, `Label` — otherwise a JSON `Properties` key); `value`
// binds as a query parameter and is never interpolated into query text.
message PropertyFilter {
  string key = 1;
  google.protobuf.Value value = 2;
}

// Execution-log-section query: the agent's most recent steps in commit-
// timestamp order.
message LogQuery {
  int32 limit                       = 1; // max steps to return
  google.protobuf.Timestamp since   = 2; // optional recency lower bound
}

// Response for MemoryService.QueryMemory. Each result section is present only
// when its corresponding request section was supplied. `fused` is present only
// when the request set `link`.
message QueryMemoryResponse {
  SemanticResult semantic = 1;
  GraphResult    graph    = 2;
  LogResult      log      = 3;
  FusedResult    fused    = 4;
  // The single read timestamp every section was evaluated at.
  google.protobuf.Timestamp read_timestamp = 5;
}

message SemanticResult {
  repeated SemanticMatch matches = 1;
}

message SemanticMatch {
  string chunk_id    = 1;
  string raw_content = 2;
  double distance    = 3; // cosine distance; smaller is closer
}

// Graph traversal result rows. Each row carries the matched elements' key
// fields (node ids and labels, and edge relationship types) keyed by gateway-
// assigned binding names, so the shape is carried as a structured value rather
// than a fixed schema.
message GraphResult {
  repeated google.protobuf.Struct rows = 1;
}

message LogResult {
  repeated ExecutionLogStep steps = 1; // timestamp-populated records, newest first
}

// The linked semantic+graph view. Its exact shape depends on fusion direction
// and is carried as structured values until the fused-result schema is pinned
// down; see the unified-memory spec's fusion requirements.
message FusedResult {
  repeated google.protobuf.Struct items = 1;
}

// ---------------------------------------------------------------------------
// Inspect
// ---------------------------------------------------------------------------

// Request for MemoryService.InspectMemory.
//
// Any subset of the three section fields may be present; at least one SHOULD
// be. All present sections are enumerated at one read snapshot within the
// caller's (EnterpriseId, AgentInstanceId) slice. There is no query anchor:
// unlike QueryMemory this lists stored rows for debugging, so a section is
// requested simply by being present, bounded by its limit.
message InspectMemoryRequest {
  string agent_instance_id = 1; // route path parameter; never read from the body

  // Vector section: list stored chunks (content only). Absent to skip vectors.
  InspectVectors vectors = 2;
  // Graph section: list stored nodes and edges. Absent to skip the graph.
  InspectGraph graph = 3;
  // Execution-log section: list recent steps. Absent to skip the log.
  InspectLog log = 4;

  // Optional as-of read timestamp, applied UNIFORMLY to every section so all
  // sections observe the same historical instant. Empty reads the latest data.
  google.protobuf.Timestamp as_of = 5;
}

// Vector-section listing request. Enumerates stored chunks; the embedding vector
// is never included in the response (it is large and not human-inspectable).
message InspectVectors {
  int32 limit = 1; // max chunks; <= 0 uses the default, clamped to a server max
}

// Graph-section listing request. Enumerates stored nodes and edges independently
// (this is a raw dump, not a traversal), each bounded by its own limit.
message InspectGraph {
  int32 node_limit = 1; // max nodes; <= 0 uses the default, clamped to a server max
  int32 edge_limit = 2; // max edges; <= 0 uses the default, clamped to a server max
}

// Execution-log-section listing request: the agent's most recent steps in
// commit-timestamp order (newest first). Mirrors LogQuery so callers can follow
// the log incrementally (poll with `since` advanced to the prior read).
message InspectLog {
  int32 limit                     = 1; // max steps to return
  google.protobuf.Timestamp since = 2; // optional recency lower bound
}

// Response for MemoryService.InspectMemory. Each result section is present only
// when its corresponding request section was supplied.
message InspectMemoryResponse {
  VectorInspectResult vectors = 1;
  GraphInspectResult  graph   = 2;
  LogResult           log     = 3; // same ExecutionLogStep records as QueryMemory
  // The single read timestamp every section was evaluated at.
  google.protobuf.Timestamp read_timestamp = 4;
}

message VectorInspectResult {
  repeated VectorChunkInfo chunks = 1;
}

// A stored vector chunk WITHOUT its embedding. The embedding column is
// deliberately omitted: it is large and carries no debugging value in a listing.
message VectorChunkInfo {
  string chunk_id    = 1;
  string raw_content = 2;
  // Output-only: the chunk's last-write commit timestamp. Chunks are upserted, so
  // this is the last write, not first creation.
  google.protobuf.Timestamp updated_at = 3;
}

// Graph listing result: the stored nodes and edges themselves (reusing the same
// GraphNode/GraphEdge shapes CommitMemory writes), NOT traversal rows.
message GraphInspectResult {
  repeated GraphNode nodes = 1;
  repeated GraphEdge edges = 2;
}

// ---------------------------------------------------------------------------
// Supersede
// ---------------------------------------------------------------------------

// Request for MemoryService.SupersedeEdge.
message SupersedeEdgeRequest {
  string agent_instance_id = 1; // route path parameter; never read from the body

  // The currently-held edge to close. Resolved within the caller's slice; an
  // unknown id is NotFound (never a cross-slice touch).
  string prior_edge_id = 2;

  // The replacement fact, inserted in the same slice. new_edge.valid_at is
  // REQUIRED — it is the supersession boundary (the prior edge's invalid_at and
  // the new edge's valid_at) and must be a concrete timestamp. new_edge.edge_id
  // must be set and differ from prior_edge_id (the replacement is inserted, not
  // upserted, so a reused id is rejected). new_edge.invalid_at may be set to open
  // the replacement already closed; its transaction-time is server-assigned. The
  // updated_at field is ignored.
  GraphEdge new_edge = 3;
}

// The supersession receipt: the commit timestamp of the transaction that closed
// the prior edge and inserted the replacement.
message SupersedeEdgeResponse {
  google.protobuf.Timestamp commit_timestamp = 1;
}
