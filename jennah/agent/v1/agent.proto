syntax = "proto3";

package jennahapi.agent.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/alphauslabs/jennah-api/agent";

// AgentService owns agent-workspace lifecycle: creating an isolated agent
// context bucket, reading it back, listing an enterprise's agents, and
// atomically deleting one (with all its memory).
//
// Every RPC is an EXTERNAL (gateway) RPC — it carries a google.api.http
// annotation so grpc-gateway publishes it on the public REST surface — and
// every RPC is AUTHENTICATED: the caller's EnterpriseId is taken from the
// verified access token, never from the request body or path. Memory-data RPCs
// (memory:commit, memory:query) live in their own service, added separately.
service AgentService {
  // Creates a new agent workspace under the caller's enterprise. The home region
  // is resolved from the optional `region` field (a Jennah region identifier
  // validated against the configured allowlist) or the platform default region;
  // the region's data-plane instance and the enterprise's named schema are
  // provisioned on first use. The EnterpriseId is taken from the token, never
  // the body.
  //
  // Returns the workspace synchronously. When provisioning is still in flight
  // the returned AgentInstance carries status AGENT_STATUS_PROVISIONING; poll
  // GetAgent until it reaches AGENT_STATUS_ACTIVE. (The first implementation
  // provisions inline and returns ACTIVE directly; the PROVISIONING status is
  // the forward-compatible signal for when region/instance creation — which can
  // take minutes — is made asynchronous.)
  rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse) {
    option (google.api.http) = {
      post: "/v1/agents"
      body: "*"
    };
  }

  // Reads a single agent workspace the caller owns, including its current
  // lifecycle status. This is the readiness-poll surface for a create that is
  // still provisioning. An agent_instance_id not owned by the caller's
  // enterprise is treated as not found.
  rpc GetAgent(GetAgentRequest) returns (GetAgentResponse) {
    option (google.api.http) = {
      get: "/v1/agents/{agent_instance_id}"
    };
  }

  // Lists the caller enterprise's agent workspaces, most-recent first, with
  // page_size/page_token pagination. Scoped to the token's EnterpriseId; never
  // returns another enterprise's agents.
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse) {
    option (google.api.http) = {
      get: "/v1/agents"
    };
  }

  // Deletes an agent workspace the caller owns with a single tenant-scoped
  // delete that cascades to all of the agent's memory (execution logs, vectors,
  // graph). Returns an erasure receipt: the commit timestamp and the per-memory-
  // type row counts removed. An agent_instance_id not owned by the caller's
  // enterprise is treated as not found.
  rpc DeleteAgent(DeleteAgentRequest) returns (DeleteAgentResponse) {
    option (google.api.http) = {
      delete: "/v1/agents/{agent_instance_id}"
    };
  }
}

// Lifecycle state of an agent workspace.
enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED = 0;
  // Ready for use: the region and enterprise schema are provisioned and the
  // AgentInstances row exists in the data plane.
  AGENT_STATUS_ACTIVE = 1;
  AGENT_STATUS_PAUSED    = 2;
  AGENT_STATUS_COMPLETED = 3;
  // Provisioning is still in flight (region instance and/or enterprise schema
  // being created). No data-plane row exists yet; poll GetAgent until ACTIVE.
  AGENT_STATUS_PROVISIONING = 4;
  // Provisioning failed; status_detail carries the reason. The caller may retry
  // CreateAgent (idempotent on agent_instance_id) or delete the failed record.
  AGENT_STATUS_FAILED = 5;
}

// A single agent workspace: an isolated context bucket owned by exactly one
// enterprise and pinned to one home region for its lifetime.
message AgentInstance {
  // Enterprise that owns this agent, resolved from the caller's token. Echoed
  // for clarity; it is never accepted from a request body.
  string                    enterprise_id     = 1;
  string                    agent_instance_id = 2; // unique within the enterprise
  string                    agent_name        = 3;
  string                    region            = 4; // Jennah region id, e.g. "us-east-1"
  AgentStatus               status            = 5;
  google.protobuf.Timestamp created_at        = 6; // server-assigned commit timestamp
  // Human-readable detail for a non-terminal/failed status (e.g. the region
  // provisioning phase, or the failure reason when status is FAILED). Empty for
  // a plain ACTIVE agent.
  string                    status_detail     = 7;
}

// Request message for the AgentService.CreateAgent rpc.
message CreateAgentRequest {
  string agent_instance_id = 1; // caller-chosen id, unique within the enterprise
  string agent_name        = 2;
  // Optional Jennah region identifier (e.g. "us-east-1"). Must be in the
  // configured region allowlist; when empty the platform default region is used.
  string region            = 3;
}

// Response message for the AgentService.CreateAgent rpc.
message CreateAgentResponse {
  AgentInstance agent = 1;
}

// Request message for the AgentService.GetAgent rpc.
message GetAgentRequest {
  string agent_instance_id = 1; // path parameter
}

// Response message for the AgentService.GetAgent rpc.
message GetAgentResponse {
  AgentInstance agent = 1;
}

// Request message for the AgentService.ListAgents rpc.
message ListAgentsRequest {
  int32  page_size  = 1; // max agents to return; server picks a default when 0
  string page_token = 2; // next_page_token from a prior response; empty for the first page
}

// Response message for the AgentService.ListAgents rpc.
message ListAgentsResponse {
  repeated AgentInstance agents          = 1;
  string                 next_page_token = 2; // empty when there are no more pages
}

// Request message for the AgentService.DeleteAgent rpc.
message DeleteAgentRequest {
  string agent_instance_id = 1; // path parameter
}

// Response message for the AgentService.DeleteAgent rpc.
//
// The erasure receipt: a commit timestamp plus how many rows were removed per
// memory type, so a caller can evidence a complete, atomic erasure.
message DeleteAgentResponse {
  google.protobuf.Timestamp deleted_at         = 1; // cascade-delete commit timestamp
  int64                     execution_log_rows = 2;
  int64                     vector_rows        = 3;
  int64                     graph_node_rows    = 4;
  int64                     graph_edge_rows    = 5;
}
