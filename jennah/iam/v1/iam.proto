syntax = "proto3";

package jennahapi.iam.v1;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/alphauslabs/jennah-api/iam";
option java_package = "cloud.alphaus.api.iam";
option java_outer_classname = "IamProto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Jennah API reference";
    description: "Jennah API is a RESTful API that can be accessed by an HTTP client such as `curl`, or any HTTP library which is part of most modern programming languages. This API reference is autogenerated from [protocol buffers](https://developers.google.com/protocol-buffers) defined in this [repository](https://github.com/alphauslabs/blueapi), together with our supported [client libraries](https://alphauslabs.github.io/docs/blueapi/client-sdks/). See the official [documentation](https://alphauslabs.github.io/docs/blueapi/overview/) for more information.\n\nYou may encounter the following feature maturity indicators:\n- **(WORK-IN-PROGRESS)** - Development is ongoing, don't use yet;\n- **(BETA)** - New or experimental features, subject to changes; and\n- **(DEPRECATED)** - Outdated or replaced features.\n\nSome endpoints, especially those that return lists of resources, have streaming responses; newline-separated stream of “chunks”. Each chunk is an envelope that can contain either a response message or an error. Only the last chunk will include an error, if any.";
    version: "v1";
  };
  host: "api.alphaus.cloud";
  base_path: "/m/blue";
  schemes: HTTPS;
};

// Iam service definition.
service IamService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    description: "Internal IAM control plane service API."
    external_docs: {
      url: "https://github.com/alphauslabs/blueapi/tree/main/org/";
      description: "Service definition";
    }
  };

  // Gets information about the caller.
  rpc WhoAmI(WhoAmIRequest) returns (google.protobuf.Struct) {
    option (google.api.http) = {
      get: "/iam/v1/whoami"
    };
  }
}

// Request message for the IamService.WhoAmI rpc.
message WhoAmIRequest {}
