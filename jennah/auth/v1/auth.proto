syntax = "proto3";

package jennahapi.auth.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "gnostic/openapi/v3/annotations.proto";

option go_package = "github.com/alphauslabs/jennah-api/auth";

// Global OpenAPI v3 document info for gnostic's protoc-gen-openapi. In v3, the
// Swagger 2.0 host/base_path/schemes are expressed as a `servers` list.
option (gnostic.openapi.v3.document) = {
  info: {
    title: "Jennah API reference";
    description: "Jennah API is a RESTful API that can be accessed by an HTTP client such as `curl`, or any HTTP library which is part of most modern programming languages. This API reference is autogenerated from [protocol buffers](https://developers.google.com/protocol-buffers) defined in this [repository](https://github.com/alphauslabs/jennah-api), together with our supported client libraries. See the official [documentation](https://alphauslabs.github.io/docs/blueapi/overview/) for more information.\n\nYou may encounter the following feature maturity indicators:\n- **(WORK-IN-PROGRESS)** - Development is ongoing, don't use yet;\n- **(BETA)** - New or experimental features, subject to changes; and\n- **(DEPRECATED)** - Outdated or replaced features.\n\nSome endpoints, especially those that return lists of resources, have streaming responses; newline-separated stream of “chunks”. Each chunk is an envelope that can contain either a response message or an error. Only the last chunk will include an error, if any.";
    version: "v1";
  }
  servers: [
    {
      url: "https://api.alphaus.cloud/m/blue";
    }
  ]
  // gnostic auto-generates one tag per service (name = service name) and, for a
  // single-service doc, blanks its description. It has no per-service external
  // docs, so the openapiv2_tag's external_docs maps to the document-level field.
  external_docs: {
    url: "https://github.com/alphauslabs/blueapi/tree/main/org/";
    description: "Service definition";
  }
};

// Auth service definition.
//
// Two RPC groups carry a google.api.http annotation and are therefore EXTERNAL
// (published on the grpc-gateway REST surface): WhoAmI, and the API-key
// management RPCs (CreateApiKey / ListApiKeys / RevokeApiKey under
// /auth/v1/apikeys). Every other RPC here is INTERNAL: it has no HTTP
// annotation, so grpc-gateway emits no route for it and it is reachable only
// over the backend's internal gRPC listener (127.0.0.1:8080), which is where
// jennah-proxy's hand-written /auth/* handlers dial it. Do NOT add a
// google.api.http annotation to the login/device/token RPCs — doing so would
// publish them on the public REST surface.
service AuthService {
  // Gets information about the caller. External (gateway) RPC. Requires a valid
  // jennah access token; returns the resolved caller identity.
  rpc WhoAmI(WhoAmIRequest) returns (WhoAmIResponse) {
    option (google.api.http) = {
      get: "/auth/v1/whoami"
    };
  }

  // --- Internal auth RPCs (no HTTP annotation; proxy-to-backend only) ---

  // Begins a browser/authorization-code login. WEB returns the encrypted state
  // blob in the response (proxy stores it in the __Host- cookie); CLI leaves it
  // empty and the backend persists state in the oauth_state Spanner row.
  // Unauthenticated (interceptor allowlist).
  rpc StartLogin(StartLoginRequest) returns (StartLoginResponse);

  // Completes a login after the provider redirects back to jennah's callback:
  // validates state/PKCE, exchanges the code, verifies the provider identity,
  // upserts the user, and mints jennah tokens. Unauthenticated (allowlist).
  rpc CompleteLogin(CompleteLoginRequest) returns (CompleteLoginResponse);

  // Redeems a single-use one-time code (issued by CompleteLogin in CODE
  // response mode) for the minted jennah tokens. Used by a confidential
  // server-side client (a BFF) so tokens are never delivered to the browser.
  // The code is single-use and short-lived. Unauthenticated (the code itself
  // is the credential; allowlist).
  rpc ExchangeCode(ExchangeCodeRequest) returns (ExchangeCodeResponse);

  // Begins the CLI device-code flow. Unauthenticated (allowlist).
  rpc StartDeviceLogin(StartDeviceLoginRequest) returns (StartDeviceLoginResponse);

  // Polls a pending device-code login for approval. Unauthenticated (allowlist).
  rpc PollDeviceLogin(PollDeviceLoginRequest) returns (PollDeviceLoginResponse);

  // Exchanges an opaque refresh token for a fresh access token. Unauthenticated
  // (the refresh token itself is the credential; allowlist).
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

  // Revokes the session behind a refresh token. Authenticated.
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // --- API-key management (external/gateway RPCs; authenticated) ---

  // Mints a new API key for the caller's active enterprise. External (gateway)
  // RPC. Authenticated AND gated to ROLE_ROOT/ROLE_ADMIN, resolved live from the
  // Memberships table (never trusted from a claim). The plaintext secret is
  // returned exactly once, in this response, and is NOT retrievable afterward —
  // only its sha256 hash is stored. The key resolves to a ROLE_MEMBER-equivalent
  // service principal scoped to the enterprise.
  rpc CreateApiKey(CreateApiKeyRequest) returns (CreateApiKeyResponse) {
    option (google.api.http) = {
      post: "/auth/v1/apikeys"
      body: "*"
    };
  }

  // Lists the caller enterprise's API keys as non-secret metadata only (never
  // the secret or its hash), most-recent first, with page_size/page_token
  // pagination. External (gateway) RPC. Authenticated; scoped to the token's
  // active enterprise.
  rpc ListApiKeys(ListApiKeysRequest) returns (ListApiKeysResponse) {
    option (google.api.http) = {
      get: "/auth/v1/apikeys"
    };
  }

  // Revokes an API key the caller's enterprise owns, taking effect on the next
  // request (validation is a per-request lookup, so there is no TTL lag).
  // External (gateway) RPC, modeled as a custom method (POST ...:revoke) rather
  // than DELETE because it does not remove the resource — the row is retained
  // with RevokedAt set, so the key stays listable as revoked. Authenticated AND
  // gated to ROLE_ROOT/ROLE_ADMIN. A key_id not owned by the caller's active
  // enterprise is treated as not found.
  rpc RevokeApiKey(RevokeApiKeyRequest) returns (RevokeApiKeyResponse) {
    option (google.api.http) = {
      post: "/auth/v1/apikeys/{key_id}:revoke"
    };
  }
}

// Identity provider jennah supports for social login.
enum Provider {
  PROVIDER_UNSPECIFIED = 0;
  PROVIDER_GOOGLE      = 1;
  PROVIDER_GITHUB      = 2;
}

// Client class initiating a login; selects the flow and where flow state lives.
enum ClientType {
  CLIENT_TYPE_UNSPECIFIED = 0;
  // Web frontend: authorization-code + PKCE, state carried in a __Host- cookie.
  CLIENT_TYPE_WEB = 1;
  // CLI: loopback / device-code, state persisted in the oauth_state table.
  CLIENT_TYPE_CLI = 2;
}

// How minted jennah tokens are delivered on the final redirect to the app's
// app_redirect. Chosen at StartLogin and carried inside the encrypted state so
// the callback resolves it without per-instance memory.
enum ResponseMode {
  // Defaults to FRAGMENT.
  RESPONSE_MODE_UNSPECIFIED = 0;
  // Public client / test harness: callback redirects with tokens in the URL
  // fragment (#access_token=...). NOT for production — the refresh token
  // transits the browser.
  RESPONSE_MODE_FRAGMENT = 1;
  // Confidential client (server-side BFF): callback redirects with only a
  // single-use ?code=...; the client redeems it via ExchangeCode. No jennah
  // token ever reaches the browser.
  RESPONSE_MODE_CODE = 2;
}

// A caller's role within an enterprise. Exactly one ROLE_ROOT per enterprise
// (its creator/owner); resolved from the Memberships table, never carried in
// the access token (so role changes apply immediately).
enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_ROOT        = 1; // creator/owner, exactly one per enterprise
  ROLE_ADMIN       = 2;
  ROLE_MEMBER      = 3;
}

// One of the caller's enterprise memberships (a row in the Memberships join
// table), surfaced in Identity so a multi-enterprise user can pick which one to
// switch into.
message Membership {
  string enterprise_id = 1;
  Role   role          = 2;
}

// The resolved jennah caller identity. jennah's own user id is authoritative;
// provider_uid/email come from the provider that established the session.
message Identity {
  string   user_id          = 1; // jennah's internal user id (not the provider uid)
  string   email            = 2;
  bool     email_verified   = 3;
  string   name             = 4;
  string   picture          = 5;
  Provider provider         = 6; // provider that established THIS session
  repeated Provider linked_providers = 7;

  // Enterprise scope. active_enterprise_id is the enterprise the current access
  // token is scoped to (the `enterprise_id` JWT claim); memberships lists every
  // enterprise the caller belongs to, for enterprise switching in the UI.
  string   active_enterprise_id      = 8;
  repeated Membership memberships     = 9;
}

// Entitlement is the caller's current tier and trial state for the active
// enterprise, mirrored from the access token so a client can render account
// status (a trial countdown, an upgrade prompt) without decoding the JWT. Only
// the trial gate is enforced today; tier is a free-form string (e.g. "trial")
// while paid tiers are still being defined.
message Entitlement {
  string tier = 1; // e.g. "trial"

  // trial_ends_at is the immutable trial deadline; unset when the caller is not
  // on a trial or has no known deadline.
  google.protobuf.Timestamp trial_ends_at = 2;

  // trial_active is the server's decision: true while the trial is still valid
  // (or the tier is not a trial), false once it has lapsed. A caller whose
  // trial has lapsed is blocked from other RPCs, so this is chiefly meaningful
  // because WhoAmI remains callable to surface exactly this state.
  bool trial_active = 3;
}

// Request message for the AuthService.WhoAmI rpc.
message WhoAmIRequest {}

// Response message for the AuthService.WhoAmI rpc.
message WhoAmIResponse {
  Identity    identity    = 1;
  Entitlement entitlement = 2;
}

// Request message for the AuthService.StartLogin rpc.
message StartLoginRequest {
  Provider     provider      = 1;
  ClientType   client_type   = 2;
  string       app_redirect  = 3; // where to send the browser after login; validated vs allowlist
  ResponseMode response_mode = 4; // token delivery on the final redirect; defaults to FRAGMENT
}

// Response message for the AuthService.StartLogin rpc.
message StartLoginResponse {
  string authorize_url = 1; // proxy 302s the browser here
  string state         = 2; // WEB: encrypted state blob for the __Host- cookie; CLI: empty
}

// Request message for the AuthService.CompleteLogin rpc.
message CompleteLoginRequest {
  Provider provider       = 1;
  string   code           = 2; // provider auth code from the callback query
  string   callback_state = 3; // `state` query param (CSRF match / oauth_state key)
  string   cookie_state   = 4; // WEB: encrypted blob read back from the __Host- cookie; CLI: empty
}

// Response message for the AuthService.CompleteLogin rpc.
//
// Delivery depends on response_mode. In FRAGMENT mode the token fields are
// populated and the proxy puts them in the redirect fragment. In CODE mode the
// tokens are withheld from this response and `code` carries the single-use
// one-time code the proxy places on the redirect (?code=...) for a confidential
// client to redeem via ExchangeCode.
message CompleteLoginResponse {
  string       access_token  = 1; // FRAGMENT mode only: jennah JWT (~1h)
  string       refresh_token = 2; // FRAGMENT mode only: opaque, revocable (~30d)
  int64        expires_in    = 3; // access-token TTL, seconds
  string       app_redirect  = 4; // validated target the proxy redirects the browser to
  Identity     identity      = 5;
  string       code          = 6; // CODE mode only: single-use one-time code for the redirect
  ResponseMode response_mode = 7; // resolved delivery mode; tells the proxy how to deliver
}

// Request message for the AuthService.ExchangeCode rpc.
message ExchangeCodeRequest {
  string code = 1; // the single-use one-time code from a CODE-mode callback
}

// Response message for the AuthService.ExchangeCode rpc.
message ExchangeCodeResponse {
  string access_token  = 1; // jennah JWT (~1h)
  string refresh_token = 2; // opaque, revocable (~30d)
  string token_type    = 3; // "Bearer"
  int64  expires_in    = 4; // access-token TTL, seconds
  bool   is_new_user   = 5; // true when this login was a first-time signup
}

// Request message for the AuthService.StartDeviceLogin rpc.
message StartDeviceLoginRequest {
  Provider provider = 1;
}

// Response message for the AuthService.StartDeviceLogin rpc.
message StartDeviceLoginResponse {
  string device_code               = 1; // secret; CLI polls with this
  string user_code                 = 2; // shown to the user
  string verification_uri          = 3;
  string verification_uri_complete = 4;
  int64  interval                  = 5; // minimum poll interval, seconds
  int64  expires_in                = 6;
}

// Request message for the AuthService.PollDeviceLogin rpc.
message PollDeviceLoginRequest {
  string device_code = 1;
}

// Response message for the AuthService.PollDeviceLogin rpc.
message PollDeviceLoginResponse {
  // Approval state of a device-code login. STATUS_PENDING means keep polling;
  // tokens/identity are populated only on STATUS_APPROVED.
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_PENDING     = 1;
    STATUS_APPROVED    = 2;
    STATUS_DENIED      = 3;
    STATUS_EXPIRED     = 4;
  }
  Status   status        = 1;
  string   access_token  = 2;
  string   refresh_token = 3;
  int64    expires_in    = 4;
  Identity identity      = 5;
}

// Request message for the AuthService.RefreshToken rpc.
message RefreshTokenRequest {
  string refresh_token = 1;
  // Optional enterprise switch: re-mint the access token scoped to this
  // enterprise instead of the session's current one. Must be an enterprise the
  // caller is a member of; empty keeps the session's existing scope.
  string enterprise_id = 2;
}

// Response message for the AuthService.RefreshToken rpc.
message RefreshTokenResponse {
  string access_token  = 1;
  string refresh_token = 2; // rotated (same value until rotation lands in phase 6)
  int64  expires_in    = 3;
}

// Request message for the AuthService.Logout rpc.
message LogoutRequest {
  string refresh_token = 1; // session to revoke
}

// Response message for the AuthService.Logout rpc.
message LogoutResponse {}

// Non-secret metadata for a single API key. The raw secret is NEVER carried
// here — it is returned only once, in CreateApiKeyResponse. `prefix` is a
// non-secret display fragment (e.g. the last 4 characters) for identifying a
// key in listings and logs.
message ApiKey {
  string                    key_id             = 1; // stable id (used in the revoke path)
  // Enterprise that owns this key, resolved from the caller's token. Echoed for
  // clarity; it is never accepted from a request body.
  string                    enterprise_id      = 2;
  string                    label              = 3; // human-readable label
  string                    prefix             = 4; // non-secret display fragment (last 4)
  string                    created_by_user_id = 5; // user who minted the key (attribution)
  google.protobuf.Timestamp created_at         = 6; // server-assigned commit timestamp
  // Best-effort last-use time; unset if the key has never been used. May lag
  // slightly under load (the update is out of band).
  google.protobuf.Timestamp last_used_at       = 7;
  // Absolute expiry; unset means the key never expires.
  google.protobuf.Timestamp expires_at         = 8;
  // Revocation time; unset while the key is active.
  google.protobuf.Timestamp revoked_at         = 9;
}

// Request message for the AuthService.CreateApiKey rpc.
message CreateApiKeyRequest {
  string label = 1; // human-readable label for the key
  // Optional absolute expiry. When unset the key never expires.
  google.protobuf.Timestamp expires_at = 2;
}

// Response message for the AuthService.CreateApiKey rpc.
//
// `secret` is the full plaintext key (prefixed `jennah_sk_`), returned exactly
// once — it cannot be retrieved again, so the caller must store it now. `key`
// holds the non-secret metadata for the same key.
message CreateApiKeyResponse {
  string secret = 1; // one-time plaintext key: "jennah_sk_..."
  ApiKey key    = 2; // non-secret metadata for the created key
}

// Request message for the AuthService.ListApiKeys rpc.
message ListApiKeysRequest {
  int32  page_size  = 1; // max keys to return; server picks a default when 0
  string page_token = 2; // next_page_token from a prior response; empty for the first page
}

// Response message for the AuthService.ListApiKeys rpc.
message ListApiKeysResponse {
  repeated ApiKey keys            = 1; // non-secret metadata only
  string          next_page_token = 2; // empty when there are no more pages
}

// Request message for the AuthService.RevokeApiKey rpc.
message RevokeApiKeyRequest {
  string key_id = 1; // path parameter; must belong to the caller's active enterprise
}

// Response message for the AuthService.RevokeApiKey rpc.
message RevokeApiKeyResponse {
  google.protobuf.Timestamp revoked_at = 1; // revocation commit timestamp
}
