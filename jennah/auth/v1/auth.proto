syntax = "proto3";

package jennahapi.auth.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "gnostic/openapi/v3/annotations.proto";

option go_package = "github.com/alphauslabs/jennah-api/auth";

// Global OpenAPI v3 document info for gnostic's protoc-gen-openapi. In v3, the
// Swagger 2.0 host/base_path/schemes are expressed as a `servers` list.
option (gnostic.openapi.v3.document) = {
  info: {
    title: "Jennah API reference";
    description: "Jennah API is a RESTful API that can be accessed by an HTTP client such as `curl`, or any HTTP library which is part of most modern programming languages. This API reference is autogenerated from [protocol buffers](https://developers.google.com/protocol-buffers) defined in this [repository](https://github.com/alphauslabs/jennah-api), together with our supported client libraries. See the official [documentation](https://jennah.nightblue.io/docs/) for more information.\n\nYou may encounter the following feature maturity indicators:\n- **(WORK-IN-PROGRESS)** - Development is ongoing, don't use yet;\n- **(BETA)** - New or experimental features, subject to changes; and\n- **(DEPRECATED)** - Outdated or replaced features.\n\nSome endpoints, especially those that return lists of resources, have streaming responses; newline-separated stream of “chunks”. Each chunk is an envelope that can contain either a response message or an error. Only the last chunk will include an error, if any.";
    version: "v1";
  }
  servers: [
    {
      url: "https://jennah.alphaus.cloud";
    }
  ]
};

// AuthService service definition.
service AuthService {
  // Gets information about the caller. External (gateway) RPC. Requires a valid
  // jennah access token; returns the resolved caller identity.
  rpc WhoAmI(WhoAmIRequest) returns (WhoAmIResponse) {
    option (google.api.http) = {
      get: "/v1/whoami"
    };
  }

  // --- Internal auth RPCs (no HTTP annotation; proxy-to-backend only) ---

  // Begins a browser/authorization-code login. WEB returns the encrypted state
  // blob in the response (proxy stores it in the __Host- cookie); CLI leaves it
  // empty and the backend persists state in the oauth_state Spanner row.
  // Unauthenticated (interceptor allowlist).
  rpc StartLogin(StartLoginRequest) returns (StartLoginResponse);

  // Completes a login after the provider redirects back to jennah's callback:
  // validates state/PKCE, exchanges the code, verifies the provider identity,
  // upserts the user, and mints jennah tokens. Unauthenticated (allowlist).
  rpc CompleteLogin(CompleteLoginRequest) returns (CompleteLoginResponse);

  // Redeems a single-use one-time code (issued by CompleteLogin in CODE
  // response mode) for the minted jennah tokens. Used by a confidential
  // server-side client (a BFF) so tokens are never delivered to the browser.
  // The code is single-use and short-lived. Unauthenticated (the code itself
  // is the credential; allowlist).
  rpc ExchangeCode(ExchangeCodeRequest) returns (ExchangeCodeResponse);

  // Begins the CLI device-code flow. Unauthenticated (allowlist).
  rpc StartDeviceLogin(StartDeviceLoginRequest) returns (StartDeviceLoginResponse);

  // Polls a pending device-code login for approval. Unauthenticated (allowlist).
  rpc PollDeviceLogin(PollDeviceLoginRequest) returns (PollDeviceLoginResponse);

  // Exchanges an opaque refresh token for a fresh access token. Unauthenticated
  // (the refresh token itself is the credential; allowlist).
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

  // Revokes the session behind a refresh token. Authenticated.
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // --- API-key management (external/gateway RPCs; authenticated) ---

  // Mints a new API key for the caller's active enterprise. External (gateway)
  // RPC. Authenticated AND gated to ROLE_ROOT/ROLE_ADMIN, resolved live from the
  // Memberships table (never trusted from a claim). The plaintext secret is
  // returned exactly once, in this response, and is NOT retrievable afterward —
  // only its sha256 hash is stored. The key resolves to a ROLE_MEMBER-equivalent
  // service principal scoped to the enterprise.
  rpc CreateApiKey(CreateApiKeyRequest) returns (CreateApiKeyResponse) {
    option (google.api.http) = {
      post: "/v1/apikeys"
      body: "*"
    };
  }

  // Lists the caller enterprise's API keys as non-secret metadata only (never
  // the secret or its hash), most-recent first, with page_size/page_token
  // pagination. External (gateway) RPC. Authenticated; scoped to the token's
  // active enterprise.
  rpc ListApiKeys(ListApiKeysRequest) returns (ListApiKeysResponse) {
    option (google.api.http) = {
      get: "/v1/apikeys"
    };
  }

  // Revokes an API key the caller's enterprise owns, taking effect on the next
  // request (validation is a per-request lookup, so there is no TTL lag).
  // External (gateway) RPC, modeled as a custom method (POST ...:revoke) rather
  // than DELETE because it does not remove the resource — the row is retained
  // with RevokedAt set, so the key stays listable as revoked. Authenticated AND
  // gated to ROLE_ROOT/ROLE_ADMIN. A key_id not owned by the caller's active
  // enterprise is treated as not found.
  rpc RevokeApiKey(RevokeApiKeyRequest) returns (RevokeApiKeyResponse) {
    option (google.api.http) = {
      post: "/v1/apikeys/{key_id}:revoke"
    };
  }

  // --- Enterprise invitations & membership management (external/gateway RPCs;
  //     authenticated) ---

  // Invites a person by email into the caller's active enterprise, granting
  // ROLE_ADMIN or ROLE_MEMBER (never ROLE_ROOT). External (gateway) RPC.
  // Authenticated AND gated to ROLE_ROOT/ROLE_ADMIN (resolved live from the
  // Memberships table). Membership is NOT granted by email match: this only
  // creates a pending invitation bound to a single-use token, returned exactly
  // once in the response for the inviter to share — the grant happens when the
  // invitee accepts (AcceptInvitation) while signed in. Rejects an email already
  // a member and a second pending invite for the same email.
  rpc InviteMember(InviteMemberRequest) returns (InviteMemberResponse) {
    option (google.api.http) = {
      post: "/v1/invitations"
      body: "*"
    };
  }

  // Lists the caller enterprise's pending invitations as non-secret metadata
  // (never any token value), most-recent first. External (gateway) RPC.
  // Authenticated AND gated to ROLE_ROOT/ROLE_ADMIN.
  rpc ListInvitations(ListInvitationsRequest) returns (ListInvitationsResponse) {
    option (google.api.http) = {
      get: "/v1/invitations"
    };
  }

  // Revokes a pending invitation so its token can never be accepted. Modeled as
  // a custom method (POST ...:revoke) rather than DELETE because the row is
  // retained with status INVITATION_STATUS_REVOKED, so it stays listable.
  // External (gateway) RPC. Authenticated AND gated to ROLE_ROOT/ROLE_ADMIN. An
  // invitation_id not in the caller's active enterprise is treated as not found.
  rpc RevokeInvitation(RevokeInvitationRequest) returns (RevokeInvitationResponse) {
    option (google.api.http) = {
      post: "/v1/invitations/{invitation_id}:revoke"
    };
  }

  // Accepts an invitation, granting the authenticated caller membership in the
  // invitation's enterprise with the invited role. External (gateway) RPC.
  // Authenticated as ANY caller: the target enterprise comes from the invitation
  // (not the caller's token), the single-use token is the capability, and the
  // caller's email need NOT match the invitation's. Already-a-member is a no-op
  // success. The caller's current access token stays scoped to their previous
  // enterprise; to operate in the newly joined one they call RefreshToken with
  // enterprise_id set.
  rpc AcceptInvitation(AcceptInvitationRequest) returns (AcceptInvitationResponse) {
    option (google.api.http) = {
      post: "/v1/invitations:accept"
      body: "*"
    };
  }

  // Lists the members of the caller's active enterprise (user id, email, role,
  // join time), oldest first. External (gateway) RPC. Authenticated; visible to
  // any member (a team roster is not sensitive within the enterprise).
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse) {
    option (google.api.http) = {
      get: "/v1/members"
    };
  }

  // Changes a member's role to ROLE_ADMIN or ROLE_MEMBER within the caller's
  // active enterprise. External (gateway) RPC. Authenticated AND gated to
  // ROLE_ROOT/ROLE_ADMIN. The enterprise's ROLE_ROOT cannot be changed and
  // ROLE_ROOT is never grantable.
  rpc ChangeMemberRole(ChangeMemberRoleRequest) returns (ChangeMemberRoleResponse) {
    option (google.api.http) = {
      post: "/v1/members/{user_id}:setRole"
      body: "*"
    };
  }

  // Removes a member from the caller's active enterprise, deleting their
  // Memberships row and revoking their refresh sessions scoped to it (so no new
  // access token can be minted for it; an already-issued one lasts until it
  // expires). External (gateway) RPC. Authenticated AND gated to
  // ROLE_ROOT/ROLE_ADMIN (a member MAY remove themselves — leave). The
  // enterprise's ROLE_ROOT cannot be removed. A user_id not in the caller's
  // active enterprise is treated as not found.
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse) {
    option (google.api.http) = {
      delete: "/v1/members/{user_id}"
    };
  }

  // Updates mutable fields of the caller's active enterprise (currently just its
  // display name). External (gateway) RPC. Authenticated AND gated to
  // ROLE_ROOT/ROLE_ADMIN (resolved live from the Memberships table). The target
  // is always the caller's active enterprise (from the token), never a path/body
  // id, mirroring ListMembers/ChangeMemberRole.
  rpc UpdateEnterprise(UpdateEnterpriseRequest) returns (UpdateEnterpriseResponse) {
    option (google.api.http) = {
      patch: "/v1/enterprise"
      body: "*"
    };
  }

  // --- RBAC roles & permissions (external/gateway RPCs; authenticated) ---

  // Lists the fixed permission catalog: every grantable "group.resource:action"
  // permission and whether it is management-class. External (gateway) RPC.
  // Authenticated, but requires no specific permission — the catalog is
  // non-sensitive metadata any member (or the console) may read to discover what
  // is grantable.
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse) {
    option (google.api.http) = {
      get: "/v1/permissions"
    };
  }

  // Defines a custom role in the caller's active enterprise: a named, explicit
  // subset of the permission catalog. External (gateway) RPC. Authenticated AND
  // requires the "iam.roles:manage" permission. The caller may grant only
  // permissions they themselves hold (anti-escalation); the name must not
  // collide with a built-in role (root/admin/member) and must be unique in the
  // enterprise; wildcards are rejected (grants enumerate concrete permissions).
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse) {
    option (google.api.http) = {
      post: "/v1/roles"
      body: "*"
    };
  }

  // Lists the caller enterprise's custom roles (built-in roles are not returned;
  // they are code-defined and universal). External (gateway) RPC. Authenticated
  // AND requires the "iam.roles:read" permission.
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse) {
    option (google.api.http) = {
      get: "/v1/roles"
    };
  }

  // Gets one custom role by id, scoped to the caller's active enterprise.
  // External (gateway) RPC. Authenticated AND requires the "iam.roles:read"
  // permission.
  rpc GetRole(GetRoleRequest) returns (GetRoleResponse) {
    option (google.api.http) = {
      get: "/v1/roles/{role_id}"
    };
  }

  // Replaces a custom role's name and permission set. External (gateway) RPC.
  // Authenticated AND requires the "iam.roles:manage" permission, with the same
  // anti-escalation and naming rules as CreateRole.
  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse) {
    option (google.api.http) = {
      patch: "/v1/roles/{role_id}"
      body: "*"
    };
  }

  // Deletes a custom role. External (gateway) RPC. Authenticated AND requires the
  // "iam.roles:manage" permission. Hard-fails with FAILED_PRECONDITION when the
  // role is still assigned to any member — those members must be reassigned
  // first, so a live membership can never dangle.
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse) {
    option (google.api.http) = {
      delete: "/v1/roles/{role_id}"
    };
  }
}

// Identity provider jennah supports for social login.
enum Provider {
  PROVIDER_UNSPECIFIED = 0;
  PROVIDER_GOOGLE      = 1;
  PROVIDER_GITHUB      = 2;
}

// Client class initiating a login; selects the flow and where flow state lives.
enum ClientType {
  CLIENT_TYPE_UNSPECIFIED = 0;
  // Web frontend: authorization-code + PKCE, state carried in a __Host- cookie.
  CLIENT_TYPE_WEB = 1;
  // CLI: loopback / device-code, state persisted in the oauth_state table.
  CLIENT_TYPE_CLI = 2;
}

// How minted jennah tokens are delivered on the final redirect to the app's
// app_redirect. Chosen at StartLogin and carried inside the encrypted state so
// the callback resolves it without per-instance memory.
enum ResponseMode {
  // Defaults to FRAGMENT.
  RESPONSE_MODE_UNSPECIFIED = 0;
  // Public client / test harness: callback redirects with tokens in the URL
  // fragment (#access_token=...). NOT for production — the refresh token
  // transits the browser.
  RESPONSE_MODE_FRAGMENT = 1;
  // Confidential client (server-side BFF): callback redirects with only a
  // single-use ?code=...; the client redeems it via ExchangeCode. No jennah
  // token ever reaches the browser.
  RESPONSE_MODE_CODE = 2;
}

// A caller's role within an enterprise. Exactly one ROLE_ROOT per enterprise
// (its creator/owner); resolved from the Memberships table, never carried in
// the access token (so role changes apply immediately).
enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_ROOT        = 1; // creator/owner, exactly one per enterprise
  ROLE_ADMIN       = 2;
  ROLE_MEMBER      = 3;
}

// One of the caller's enterprise memberships (a row in the Memberships join
// table), surfaced in Identity so a multi-enterprise user can pick which one to
// switch into.
message Membership {
  string enterprise_id   = 1;
  Role   role            = 2;
  string enterprise_name = 3; // enterprise display name; may be empty
  // Set when the caller holds a custom RBAC role in this enterprise rather than a
  // built-in one; it is the assigned role's id (join against ListRoles for its
  // name/permissions). Empty for a built-in role, where `role` carries it.
  string custom_role_id  = 4;
}

// The resolved jennah caller identity. jennah's own user id is authoritative;
// provider_uid/email come from the provider that established the session.
message Identity {
  string   user_id          = 1; // jennah's internal user id (not the provider uid)
  string   email            = 2;
  bool     email_verified   = 3;
  string   name             = 4;
  string   picture          = 5;
  Provider provider         = 6; // provider that established THIS session
  repeated Provider linked_providers = 7;

  // Enterprise scope. active_enterprise_id is the enterprise the current access
  // token is scoped to (the `enterprise_id` JWT claim); memberships lists every
  // enterprise the caller belongs to, for enterprise switching in the UI.
  string   active_enterprise_id      = 8;
  repeated Membership memberships     = 9;
}

// Entitlement is the caller's current tier and trial state for the active
// enterprise, mirrored from the access token so a client can render account
// status (a trial countdown, an upgrade prompt) without decoding the JWT. Only
// the trial gate is enforced today; tier is a free-form string (e.g. "trial")
// while paid tiers are still being defined.
message Entitlement {
  string tier = 1; // e.g. "trial"

  // trial_ends_at is the immutable trial deadline; unset when the caller is not
  // on a trial or has no known deadline.
  google.protobuf.Timestamp trial_ends_at = 2;

  // trial_active is the server's decision: true while the trial is still valid
  // (or the tier is not a trial), false once it has lapsed. A caller whose
  // trial has lapsed is blocked from other RPCs, so this is chiefly meaningful
  // because WhoAmI remains callable to surface exactly this state.
  bool trial_active = 3;
}

// Request message for the AuthService.WhoAmI rpc.
message WhoAmIRequest {}

// Response message for the AuthService.WhoAmI rpc.
message WhoAmIResponse {
  Identity    identity    = 1;
  Entitlement entitlement = 2;
  // The caller's effective permissions in the active enterprise, resolved
  // server-side from their membership role (built-in or custom) — never from the
  // token. Each is a concrete "group.resource:action" catalog grant. Empty when
  // auth/RBAC is not configured. A client uses this to enable/disable admin
  // controls precisely, instead of inferring capability from the built-in role.
  repeated string permissions = 3;
}

// Request message for the AuthService.StartLogin rpc.
message StartLoginRequest {
  Provider     provider      = 1;
  ClientType   client_type   = 2;
  string       app_redirect  = 3; // where to send the browser after login; validated vs allowlist
  ResponseMode response_mode = 4; // token delivery on the final redirect; defaults to FRAGMENT
}

// Response message for the AuthService.StartLogin rpc.
message StartLoginResponse {
  string authorize_url = 1; // proxy 302s the browser here
  string state         = 2; // WEB: encrypted state blob for the __Host- cookie; CLI: empty
}

// Request message for the AuthService.CompleteLogin rpc.
message CompleteLoginRequest {
  Provider provider       = 1;
  string   code           = 2; // provider auth code from the callback query
  string   callback_state = 3; // `state` query param (CSRF match / oauth_state key)
  string   cookie_state   = 4; // WEB: encrypted blob read back from the __Host- cookie; CLI: empty
}

// Response message for the AuthService.CompleteLogin rpc.
//
// Delivery depends on response_mode. In FRAGMENT mode the token fields are
// populated and the proxy puts them in the redirect fragment. In CODE mode the
// tokens are withheld from this response and `code` carries the single-use
// one-time code the proxy places on the redirect (?code=...) for a confidential
// client to redeem via ExchangeCode.
message CompleteLoginResponse {
  string       access_token  = 1; // FRAGMENT mode only: jennah JWT (~1h)
  string       refresh_token = 2; // FRAGMENT mode only: opaque, revocable (~30d)
  int64        expires_in    = 3; // access-token TTL, seconds
  string       app_redirect  = 4; // validated target the proxy redirects the browser to
  Identity     identity      = 5;
  string       code          = 6; // CODE mode only: single-use one-time code for the redirect
  ResponseMode response_mode = 7; // resolved delivery mode; tells the proxy how to deliver
}

// Request message for the AuthService.ExchangeCode rpc.
message ExchangeCodeRequest {
  string code = 1; // the single-use one-time code from a CODE-mode callback
}

// Response message for the AuthService.ExchangeCode rpc.
message ExchangeCodeResponse {
  string access_token  = 1; // jennah JWT (~1h)
  string refresh_token = 2; // opaque, revocable (~30d)
  string token_type    = 3; // "Bearer"
  int64  expires_in    = 4; // access-token TTL, seconds
  bool   is_new_user   = 5; // true when this login was a first-time signup
}

// Request message for the AuthService.StartDeviceLogin rpc.
message StartDeviceLoginRequest {
  Provider provider = 1;
}

// Response message for the AuthService.StartDeviceLogin rpc.
message StartDeviceLoginResponse {
  string device_code               = 1; // secret; CLI polls with this
  string user_code                 = 2; // shown to the user
  string verification_uri          = 3;
  string verification_uri_complete = 4;
  int64  interval                  = 5; // minimum poll interval, seconds
  int64  expires_in                = 6;
}

// Request message for the AuthService.PollDeviceLogin rpc.
message PollDeviceLoginRequest {
  string device_code = 1;
}

// Response message for the AuthService.PollDeviceLogin rpc.
message PollDeviceLoginResponse {
  // Approval state of a device-code login. STATUS_PENDING means keep polling;
  // tokens/identity are populated only on STATUS_APPROVED.
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_PENDING     = 1;
    STATUS_APPROVED    = 2;
    STATUS_DENIED      = 3;
    STATUS_EXPIRED     = 4;
  }
  Status   status        = 1;
  string   access_token  = 2;
  string   refresh_token = 3;
  int64    expires_in    = 4;
  Identity identity      = 5;
}

// Request message for the AuthService.RefreshToken rpc.
message RefreshTokenRequest {
  string refresh_token = 1;
  // Optional enterprise switch: re-mint the access token scoped to this
  // enterprise instead of the session's current one. Must be an enterprise the
  // caller is a member of; empty keeps the session's existing scope.
  string enterprise_id = 2;
}

// Response message for the AuthService.RefreshToken rpc.
message RefreshTokenResponse {
  string access_token  = 1;
  string refresh_token = 2; // rotated (same value until rotation lands in phase 6)
  int64  expires_in    = 3;
}

// Request message for the AuthService.Logout rpc.
message LogoutRequest {
  string refresh_token = 1; // session to revoke
}

// Response message for the AuthService.Logout rpc.
message LogoutResponse {}

// Non-secret metadata for a single API key. The raw secret is NEVER carried
// here — it is returned only once, in CreateApiKeyResponse. `last4` is a
// non-secret display fragment (the last 4 characters) for identifying a key in
// listings and logs.
message ApiKey {
  string                    key_id             = 1; // stable id (used in the revoke path)
  // Enterprise that owns this key, resolved from the caller's token. Echoed for
  // clarity; it is never accepted from a request body.
  string                    enterprise_id      = 2;
  string                    label              = 3; // human-readable label
  string                    last4              = 4; // non-secret display fragment (last 4 chars)
  string                    created_by_user_id = 5; // user who minted the key (attribution)
  google.protobuf.Timestamp created_at         = 6; // server-assigned commit timestamp
  // Best-effort last-use time; unset if the key has never been used. May lag
  // slightly under load (the update is out of band).
  google.protobuf.Timestamp last_used_at       = 7;
  // Absolute expiry; unset means the key never expires.
  google.protobuf.Timestamp expires_at         = 8;
  // Revocation time; unset while the key is active.
  google.protobuf.Timestamp revoked_at         = 9;
  // RBAC permission scope the key authenticates with: the concrete
  // "group.resource:action" permissions it holds, fixed at creation. Empty means
  // the key carries no explicit scope and resolves to the member-equivalent
  // default. Management-class permissions never appear here.
  repeated string           scopes             = 10;
}

// Request message for the AuthService.CreateApiKey rpc.
//
// The new key is bound to the caller's active enterprise — the enterprise_id
// scope of the access token used to make the call. There is intentionally no
// enterprise field here: a member belonging to more than one enterprise mints
// a key for whichever enterprise their token is currently scoped to. To target
// a different enterprise they belong to, they first switch scope via
// RefreshToken (enterprise_id) and then call CreateApiKey.
message CreateApiKeyRequest {
  string label = 1; // human-readable label for the key
  // Optional absolute expiry. When unset the key never expires.
  google.protobuf.Timestamp expires_at = 2;
  // Optional RBAC scope: the concrete "group.resource:action" permissions the
  // key may exercise. Each MUST be a subset of the caller's own effective
  // permissions (anti-escalation) and MUST NOT be a management-class permission
  // (a key can never manage keys, members, roles, or enterprise settings). When
  // empty, the key defaults to the member-equivalent data-plane scope.
  repeated string scopes = 3;
}

// Response message for the AuthService.CreateApiKey rpc.
//
// `secret` is the full plaintext key (prefixed `jennah_sk_`), returned exactly
// once — it cannot be retrieved again, so the caller must store it now. `key`
// holds the non-secret metadata for the same key.
message CreateApiKeyResponse {
  string secret = 1; // one-time plaintext key: "jennah_sk_..."
  ApiKey key    = 2; // non-secret metadata for the created key
}

// Request message for the AuthService.ListApiKeys rpc.
message ListApiKeysRequest {
  int32  page_size  = 1; // max keys to return; server picks a default when 0
  string page_token = 2; // next_page_token from a prior response; empty for the first page
}

// Response message for the AuthService.ListApiKeys rpc.
message ListApiKeysResponse {
  repeated ApiKey keys            = 1; // non-secret metadata only
  string          next_page_token = 2; // empty when there are no more pages
}

// Request message for the AuthService.RevokeApiKey rpc.
message RevokeApiKeyRequest {
  string key_id = 1; // path parameter; must belong to the caller's active enterprise
}

// Response message for the AuthService.RevokeApiKey rpc.
message RevokeApiKeyResponse {
  google.protobuf.Timestamp revoked_at = 1; // revocation commit timestamp
}

// Lifecycle state of an enterprise invitation. PENDING invites are acceptable
// until they expire; ACCEPTED and REVOKED are terminal.
enum InvitationStatus {
  INVITATION_STATUS_UNSPECIFIED = 0;
  INVITATION_STATUS_PENDING     = 1;
  INVITATION_STATUS_ACCEPTED    = 2;
  INVITATION_STATUS_REVOKED     = 3;
}

// Non-secret metadata for a single enterprise invitation. The invite token is
// NEVER carried here — it is returned only once, in InviteMemberResponse; only
// its sha256 hash is stored.
message Invitation {
  string invitation_id     = 1; // stable id (used in the revoke path)
  // Enterprise the invitee is invited into, resolved from the inviter's token.
  // Echoed for clarity; it is never accepted from a request body.
  string enterprise_id     = 2;
  string email             = 3; // addressed-to (lower-cased); a display/label, not a credential
  Role   role              = 4; // granted on accept: ROLE_ADMIN or ROLE_MEMBER
  string invited_by_user_id = 5; // user who created the invite (attribution)
  InvitationStatus status  = 6;
  google.protobuf.Timestamp created_at = 7; // server-assigned commit timestamp
  google.protobuf.Timestamp expires_at = 8; // a PENDING invite is unacceptable after this
}

// A member of an enterprise, for ListMembers.
message Member {
  string user_id = 1; // jennah user id
  string email   = 2; // the member's primary email
  // Built-in role within the enterprise. ROLE_UNSPECIFIED when the member holds
  // a custom role instead — see custom_role_id.
  Role   role    = 3;
  google.protobuf.Timestamp joined_at = 4; // Memberships row creation time
  // Set when the member holds a custom RBAC role rather than a built-in one; it
  // is the assigned role's id (join against ListRoles for its name/permissions).
  // Empty for a built-in role, where `role` carries the assignment.
  string custom_role_id = 5;
}

// Request message for the AuthService.InviteMember rpc.
message InviteMemberRequest {
  string email = 1; // invitee's email (an addressing label; not resolved to an account)
  Role   role  = 2; // ROLE_ADMIN or ROLE_MEMBER (ROLE_ROOT is rejected)
}

// Response message for the AuthService.InviteMember rpc.
//
// `token` is the one-time invite token (prefixed `jennah_inv_`), returned
// exactly once for the inviter to share out-of-band — it cannot be retrieved
// again. `invitation` holds the non-secret metadata for the same invite.
message InviteMemberResponse {
  string     token      = 1; // one-time invite token: "jennah_inv_..."
  Invitation invitation = 2; // non-secret metadata for the created invitation
}

// Request message for the AuthService.ListInvitations rpc.
message ListInvitationsRequest {
  int32  page_size  = 1; // max invitations to return; server picks a default when 0
  string page_token = 2; // next_page_token from a prior response; empty for the first page
}

// Response message for the AuthService.ListInvitations rpc.
message ListInvitationsResponse {
  repeated Invitation invitations     = 1; // pending only; never any token value
  string              next_page_token = 2; // empty when there are no more pages
}

// Request message for the AuthService.RevokeInvitation rpc.
message RevokeInvitationRequest {
  string invitation_id = 1; // path parameter; must belong to the caller's active enterprise
}

// Response message for the AuthService.RevokeInvitation rpc.
message RevokeInvitationResponse {}

// Request message for the AuthService.AcceptInvitation rpc.
message AcceptInvitationRequest {
  string token = 1; // the one-time invite token shared with the invitee
}

// Response message for the AuthService.AcceptInvitation rpc.
//
// Reports the enterprise the caller just joined and the granted role. To operate
// in that enterprise the caller re-mints their access token via RefreshToken
// with enterprise_id set to `enterprise_id`.
message AcceptInvitationResponse {
  string enterprise_id  = 1; // enterprise the caller joined
  Role   role           = 2; // role granted (or already held)
  bool   already_member = 3; // true if the caller was already a member (no-op grant)
}

// Request message for the AuthService.ListMembers rpc.
message ListMembersRequest {
  int32  page_size  = 1; // max members to return; server picks a default when 0
  string page_token = 2; // next_page_token from a prior response; empty for the first page
}

// Response message for the AuthService.ListMembers rpc.
message ListMembersResponse {
  repeated Member members         = 1;
  string          next_page_token = 2; // empty when there are no more pages
}

// Request message for the AuthService.ChangeMemberRole rpc.
//
// Assign either a built-in role (via `role`) or a custom RBAC role (via
// `custom_role_id`). When `custom_role_id` is non-empty it takes precedence and
// `role` is ignored; the id must name a custom role defined in the caller's
// active enterprise, and the caller may assign it only if it grants no
// permission the caller lacks (assignment anti-escalation). ROLE_ROOT is never
// assignable by either field.
message ChangeMemberRoleRequest {
  string user_id        = 1; // path parameter; a member of the caller's active enterprise
  Role   role           = 2; // built-in target: ROLE_ADMIN or ROLE_MEMBER (ROLE_ROOT is rejected)
  string custom_role_id = 3; // optional: a custom role id in the active enterprise; takes precedence over `role`
}

// Response message for the AuthService.ChangeMemberRole rpc.
message ChangeMemberRoleResponse {
  Member member = 1; // the updated membership
}

// Request message for the AuthService.RemoveMember rpc.
message RemoveMemberRequest {
  string user_id = 1; // path parameter; a member of the caller's active enterprise
}

// Response message for the AuthService.RemoveMember rpc.
message RemoveMemberResponse {}

// A jennah enterprise (the top-level tenant/organization). Minimal projection
// returned by enterprise RPCs; the authoritative row lives in the Enterprises
// table.
message Enterprise {
  string enterprise_id = 1;
  string name          = 2; // display name; may be empty until set
}

// Request message for the AuthService.UpdateEnterprise rpc. Targets the caller's
// active enterprise (from the access token), so it carries no id.
message UpdateEnterpriseRequest {
  string name = 1; // new display name; trimmed and required non-blank server-side (max 256)
}

// Response message for the AuthService.UpdateEnterprise rpc.
message UpdateEnterpriseResponse {
  Enterprise enterprise = 1; // the updated enterprise
}

// A single entry in the RBAC permission catalog. `id` is the canonical
// "group.resource:action" string (the value used in role grants and API-key
// scopes); group/resource/action are its parsed parts, for grouping in a UI.
message Permission {
  string id         = 1; // e.g. "agent.agents:create"
  string group      = 2; // e.g. "agent"
  string resource   = 3; // e.g. "agents"
  string action     = 4; // e.g. "create"
  // True for a management-class permission (administrative; never grantable to
  // an API key). False for a data-plane permission.
  bool   management = 5;
}

// A custom, enterprise-scoped RBAC role: a named subset of the permission
// catalog. Built-in roles (root/admin/member) are code-defined and are NOT
// represented by this message.
message CustomRole {
  string role_id       = 1; // stable id (used in assignment and the role path)
  // Enterprise that owns the role, from the caller's token. Echoed for clarity;
  // never accepted from a request body.
  string enterprise_id = 2;
  string name          = 3; // unique within the enterprise; must not shadow a built-in role
  repeated string permissions = 4; // explicit "group.resource:action" grants (no wildcards)
  google.protobuf.Timestamp created_at = 5; // server-assigned commit timestamp
  google.protobuf.Timestamp updated_at = 6; // last modification; unset until first update
}

// Request message for the AuthService.ListPermissions rpc.
message ListPermissionsRequest {}

// Response message for the AuthService.ListPermissions rpc.
message ListPermissionsResponse {
  repeated Permission permissions = 1; // the full catalog
}

// Request message for the AuthService.CreateRole rpc. The role is created in the
// caller's active enterprise (from the token); there is no enterprise field.
message CreateRoleRequest {
  string name = 1; // unique within the enterprise; must not shadow a built-in role
  repeated string permissions = 2; // explicit "group.resource:action" grants (no wildcards)
}

// Response message for the AuthService.CreateRole rpc.
message CreateRoleResponse {
  CustomRole role = 1; // the created role
}

// Request message for the AuthService.ListRoles rpc.
message ListRolesRequest {
  int32  page_size  = 1; // max roles to return; server picks a default when 0
  string page_token = 2; // next_page_token from a prior response; empty for the first page
}

// Response message for the AuthService.ListRoles rpc.
message ListRolesResponse {
  repeated CustomRole roles           = 1; // custom roles only
  string              next_page_token = 2; // empty when there are no more pages
}

// Request message for the AuthService.GetRole rpc.
message GetRoleRequest {
  string role_id = 1; // path parameter; must belong to the caller's active enterprise
}

// Response message for the AuthService.GetRole rpc.
message GetRoleResponse {
  CustomRole role = 1;
}

// Request message for the AuthService.UpdateRole rpc. Replaces the role's name
// and permission set (full replacement, not a merge).
message UpdateRoleRequest {
  string role_id = 1; // path parameter; must belong to the caller's active enterprise
  string name    = 2; // unique within the enterprise; must not shadow a built-in role
  repeated string permissions = 3; // explicit "group.resource:action" grants (no wildcards)
}

// Response message for the AuthService.UpdateRole rpc.
message UpdateRoleResponse {
  CustomRole role = 1; // the updated role
}

// Request message for the AuthService.DeleteRole rpc.
message DeleteRoleRequest {
  string role_id = 1; // path parameter; must belong to the caller's active enterprise
}

// Response message for the AuthService.DeleteRole rpc.
message DeleteRoleResponse {}
